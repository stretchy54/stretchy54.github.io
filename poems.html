    .page-hero { background: var(--parchment); border-bottom: 1px solid var(--stone); padding: 3.5rem 2rem 2.5rem; text-align: center; }
    .poems-layout { max-width: 720px; margin: 0 auto; padding: 3rem 2rem 5rem; }

    /* ── Loading / error state ── */
    .poems-status { text-align: center; font-family: var(--font-accent); font-style: italic; color: var(--smoke); padding: 3rem 0; }

    /* ── Poem count ── */
    .poems-count { font-family: var(--font-accent); font-size: 0.82rem; letter-spacing: 0.1em; color: var(--smoke); text-align: center; margin-bottom: 2rem; text-transform: uppercase; }

    /* ── Each poem panel ── */
    .poem-panel { border: 1px solid var(--parchment); border-radius: 4px; background: var(--warm-white); box-shadow: var(--shadow-card); margin-bottom: 1rem; overflow: hidden; }

    /* ── Toggle button ── */
    .poem-toggle {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      background: transparent;
      border: none;
      padding: 1.2rem 1.5rem;
      cursor: pointer;
      text-align: left;
      transition: background 0.18s;
    }
    .poem-toggle:hover { background: var(--parchment); }
    .poem-toggle[aria-expanded="true"] { background: var(--parchment); border-bottom: 1px solid var(--stone); }
    .poem-toggle-left { flex: 1; min-width: 0; }
    .poem-title {
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--umber);
      line-height: 1.3;
      margin-bottom: 0.2rem;
    }
    .poem-date {
      font-family: var(--font-accent);
      font-size: 0.78rem;
      color: var(--smoke);
      letter-spacing: 0.06em;
    }
    .poem-chevron {
      font-size: 0.8rem;
      color: var(--terracotta);
      transition: transform 0.25s;
      flex-shrink: 0;
      margin-top: 0.25rem;
    }
    .poem-toggle[aria-expanded="true"] .poem-chevron { transform: rotate(180deg); }

    /* ── Poem body ── */
    .poem-body { display: none; padding: 1.6rem 1.8rem 1.8rem; }
    .poem-body.open { display: block; }
    .poem-note {
      font-family: var(--font-accent);
      font-style: italic;
      font-size: 0.85rem;
      color: var(--terracotta);
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid var(--parchment);
    }
    .poem-text {
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.9;
      color: var(--charcoal);
      /* Preserve line breaks without collapsing spaces */
      white-space: pre-line;
    }
    /* Allow HTML tags inside poem-text to render correctly */
    .poem-text em  { font-style: italic; font-family: var(--font-accent); }
    .poem-text strong { font-weight: 700; color: var(--umber); }

    @media (max-width: 480px) {
      .poem-toggle { padding: 1rem 1.1rem; }
      .poem-body { padding: 1.2rem 1.2rem 1.5rem; }
      .poem-title { font-size: 0.95rem; }
    }

<script>
(function() {

  var currentLang = window.SGKLang ? window.SGKLang.get('en') : 'en';

  function formatDate(dateStr) {
    // dateStr is "YYYY-MM-DD"
    var months_en = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var months_it = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
    var parts = dateStr.split('-');
    var y = parts[0], m = parseInt(parts[1],10) - 1, d = parseInt(parts[2],10);
    var months = currentLang === 'it' ? months_it : months_en;
    return months[m] + ' ' + d + ', ' + y;
  }

  // Convert \n to <br> for rendering, while preserving HTML tags
  function renderText(text) {
    // Replace literal \n with <br>
    return text.replace(/\n/g, '<br>');
  }

  // Plain text teaser (strip HTML tags, take first 3-4 non-empty lines)
  function getTeaser(text, maxLines) {
    var plain = text.replace(/<[^>]+>/g, '');
    var lines = plain.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length > 0; });
    return lines.slice(0, maxLines || 4).join('\n');
  }

  function renderPoems(poems) {
    var status  = document.getElementById('poems-status');
    var countEl = document.getElementById('poems-count');
    var list    = document.getElementById('poems-list');

    status.style.display = 'none';
    countEl.style.display = 'block';
    countEl.textContent = currentLang === 'it'
      ? poems.length + ' poesie e storie'
      : poems.length + ' poems & stories';

    list.innerHTML = '';

    poems.forEach(function(poem, idx) {
      var bodyId   = 'poem-body-' + idx;
      var toggleId = 'poem-toggle-' + idx;

      var panel = document.createElement('div');
      panel.className = 'poem-panel fade-up';

      var noteHtml = poem.note
        ? '<div class="poem-note">' + poem.note + '</div>'
        : '';

      panel.innerHTML =
        '<button class="poem-toggle" id="' + toggleId + '" aria-expanded="false" aria-controls="' + bodyId + '">' +
          '<div class="poem-toggle-left">' +
            '<div class="poem-title">' + poem.title + '</div>' +
            '<div class="poem-date">' + formatDate(poem.date) + '</div>' +
          '</div>' +
          '<span class="poem-chevron">▼</span>' +
        '</button>' +
        '<div class="poem-body" id="' + bodyId + '">' +
          noteHtml +
          '<div class="poem-text">' + renderText(poem.text) + '</div>' +
        '</div>';

      var toggle = panel.querySelector('.poem-toggle');
      var body   = panel.querySelector('.poem-body');
      toggle.addEventListener('click', function() {
        var isOpen = body.classList.toggle('open');
        toggle.setAttribute('aria-expanded', isOpen);
      });

      list.appendChild(panel);
    });
  }

  fetch('poems.json')
    .then(function(r) {
      if (!r.ok) throw new Error('Failed to load poems.json');
      return r.json();
    })
    .then(function(poems) {
      // Already sorted newest first in the JSON
      renderPoems(poems);

      // Auto-open a poem if ?open=Title is in the URL
      var params = new URLSearchParams(window.location.search);
      var openTitle = params.get('open');
      if (openTitle) {
        // Find the panel whose title matches
        var panels = document.querySelectorAll('.poem-panel');
        panels.forEach(function(panel) {
          var titleEl = panel.querySelector('.poem-title');
          if (titleEl && titleEl.textContent.trim() === openTitle.trim()) {
            var toggle = panel.querySelector('.poem-toggle');
            var body   = panel.querySelector('.poem-body');
            body.classList.add('open');
            toggle.setAttribute('aria-expanded', 'true');
            // Scroll smoothly to it after a short delay
            setTimeout(function() {
              panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 150);
          }
        });
      }
    })
    .catch(function(err) {
      var status = document.getElementById('poems-status');
      status.textContent = currentLang === 'it'
        ? 'Impossibile caricare le poesie. Riprova più tardi.'
        : 'Unable to load poems. Please try again later.';
    });

})();
</script>
