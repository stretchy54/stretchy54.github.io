<!DOCTYPE html>
<html lang="it" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google" content="notranslate">
  <meta name="description"       content="Scarica e leggi Radici Forti, Frutti Buoni di Steven G Kukla in formato PDF gratuito." />
  <!-- Open Graph / social media preview -->
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="La Leonessa" />
  <meta property="og:url"         content="https://stretchy54.github.io/viewer.html" />
  <meta property="og:title"       content="Libro PDF — La Leonessa" />
  <meta property="og:description" content="Scarica e leggi Radici Forti, Frutti Buoni di Steven G Kukla in formato PDF gratuito." />
  <meta property="og:image"       content="https://stretchy54.github.io/assets/lioness.jpg" />
  <!-- Twitter / X card -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Libro PDF — La Leonessa" />
  <meta name="twitter:description" content="Scarica e leggi Radici Forti, Frutti Buoni di Steven G Kukla in formato PDF gratuito." />
  <meta name="twitter:image"       content="https://stretchy54.github.io/assets/lioness.jpg" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Visualizzatore Documento</title>

  <!-- Shared SGK stylesheet (provides reset, tokens, fonts) -->
  <link rel="stylesheet" href="style.css">
  <!-- Cinzel is webapp-only; not in style.css -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* ── Webapp token aliases ── */
    :root {
      --webapp-blue:   #2B5F8E;
      --webapp-rule:   rgba(181,148,64,0.25);
      --webapp-shadow: 0 8px 32px rgba(0,0,0,0.10);
    }

    /* Viewer needs full-height layout */
    html, body {
      height: 100%;
      background-color: #f5f0e8;
    }
    body {
      display: flex;
      flex-direction: column;
    }
    /* style.css injects a body::before noise texture overlay (position:fixed, z-index:0).
       Neutralize it for webapp pages — they don't use the SGK texture. */
    body::before { display: none; }

    /* ── Sticky back bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      padding: 14px 16px 10px;
      background: linear-gradient(to bottom, rgba(245,240,232,0.98), rgba(245,240,232,0.86));
      border-bottom: 1px solid var(--webapp-rule);
      backdrop-filter: blur(6px);
    }
    .backWrap { display: flex; justify-content: center; }
    .backBtn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 26px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--webapp-blue), #1e4470);
      color: #fff;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: clamp(15px, 2.4vw, 18px);
      letter-spacing: 0.04em;
      box-shadow: var(--webapp-shadow);
      transition: filter 0.15s, transform 0.15s;
    }
    .backBtn:hover { filter: brightness(1.1); transform: translateY(-1px); }

    /* ── PDF viewer ── */
    .viewer-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: calc(100vh - 70px);
    }
    .pdf-embed {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    /* ── Mobile fallback ── */
    .mobile-fallback {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 48px 24px;
      text-align: center;
    }
    .mobile-fallback p {
      font-style: italic;
      font-size: clamp(16px, 2.4vw, 20px);
      color: var(--smoke);
      line-height: 1.5;
      max-width: 360px;
    }
    .open-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--webapp-blue), #1e4470);
      color: #fff;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 18px;
      letter-spacing: 0.04em;
      box-shadow: var(--webapp-shadow);
      transition: filter 0.15s, transform 0.15s;
    }
    .open-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

    @media (max-width: 700px) {
      .pdf-embed       { display: none; }
      .mobile-fallback { display: flex; }
    }
    @media (min-width: 701px) {
      .pdf-embed       { display: block; }
      .mobile-fallback { display: none; }
    }
  </style>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H006E6GDXT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-H006E6GDXT');
  </script>
</head>

<body>

  <div class="topbar">
    <div class="backWrap">
      <a id="backBtn" class="backBtn" href="index.html">← <span id="backLabel">Torna alla Pagina Principale</span></a>
    </div>
  </div>

  <div class="viewer-wrap">
    <!-- Desktop PDF embed -->
    <iframe id="pdfEmbed" class="pdf-embed" src="" title="PDF Viewer"></iframe>

    <!-- Mobile fallback -->
    <div class="mobile-fallback">
      <p id="fallbackMsg">Tocca il pulsante per aprire il PDF. Usa il tasto indietro del browser per tornare qui.</p>
      <a id="openBtn" class="open-btn" href="#">⬇ <span id="openLabel">Apri PDF</span></a>
    </div>
  </div>

  <!-- Shared language utility (must load before inline script) -->
  <script src="lang.js"></script>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var file   = params.get('file') || '';
      var lang   = window.SGKLang.get('it'); // webapp defaults to Italian

      if (lang === 'en') {
        document.documentElement.lang            = 'en';
        document.title                           = 'Document Viewer';
        document.getElementById('backLabel').textContent   = 'Back to Main Page';
        document.getElementById('fallbackMsg').textContent = 'Tap the button to open the PDF. Use your browser back button to return here.';
        document.getElementById('openLabel').textContent   = 'Open PDF';
      } else {
        document.documentElement.lang            = 'it';
        document.title                           = 'Visualizzatore Documento';
        document.getElementById('backLabel').textContent   = 'Torna alla Pagina Principale';
        document.getElementById('fallbackMsg').textContent = 'Tocca il pulsante per aprire il PDF. Usa il tasto indietro del browser per tornare qui.';
        document.getElementById('openLabel').textContent   = 'Apri PDF';
      }

      document.getElementById('backBtn').href = 'index.html?lang=' + lang;

      if (file) {
        document.getElementById('pdfEmbed').src = file;
        document.getElementById('openBtn').href  = file;
      }
    })();
  </script>

</body>
</html>
