<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Play Track – SGK</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--charcoal); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .outbound-card {
      background: var(--sand);
      border: 1px solid var(--stone);
      border-radius: 8px;
      max-width: 480px;
      width: 100%;
      padding: 2.5rem 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .outbound-icon { font-size: 2.8rem; margin-bottom: 0.8rem; }
    .outbound-label {
      font-family: var(--font-accent);
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 0.4rem;
    }
    .outbound-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--umber);
      margin-bottom: 0.3rem;
      line-height: 1.25;
    }
    .outbound-album {
      font-family: var(--font-accent);
      font-style: italic;
      font-size: 0.95rem;
      color: var(--smoke);
      margin-bottom: 2rem;
    }
    .outbound-play {
      display: block;
      width: 100%;
      background: var(--terracotta);
      color: #fff;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 0.9rem 1.5rem;
      border-radius: var(--radius);
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
      margin-bottom: 1rem;
    }
    .outbound-play:hover { background: var(--umber); }
    .outbound-back {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--smoke);
      text-decoration: none;
      padding: 0.5rem 0.8rem;
      border-radius: var(--radius);
      transition: color 0.2s;
    }
    .outbound-back:hover { color: var(--umber); }
    .outbound-back::before { content: '←'; font-size: 1rem; }
    .sgk-logo {
      font-family: var(--font-display);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--stone);
      margin-bottom: 1.5rem;
      display: block;
    }
  </style>
</head>
<body>
  <div class="outbound-card">
    <span class="sgk-logo">SGK</span>
    <div class="outbound-icon">🎵</div>
    <div class="outbound-label" id="card-label">Track of the Month</div>
    <div class="outbound-title" id="card-title">Loading…</div>
    <div class="outbound-album" id="card-album"></div>
    <a class="outbound-play" id="play-link" href="#" target="_blank" rel="noopener">▶ Play on YouTube / Streaming</a>
    <a class="outbound-back" id="back-link" href="sgk.html">Return to SGK Website</a>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const url    = params.get('url')  || 'sgk-music.html';
    const title  = params.get('title')|| '';
    const album  = params.get('album')|| '';
    const back   = params.get('back') || 'sgk.html';
    const lang   = params.get('lang') || (function(){ try{ return localStorage.getItem('sgk-lang')||'en'; }catch(e){ return 'en'; } })();

    if (title) document.getElementById('card-title').textContent = title;
    if (album) document.getElementById('card-album').textContent = album;

    const playLink = document.getElementById('play-link');
    playLink.href = url;

    const backLink = document.getElementById('back-link');
    backLink.href = back;

    // Italian labels
    if (lang === 'it') {
      document.getElementById('card-label').textContent = 'Brano del Mese';
      playLink.textContent = '▶ Ascolta su YouTube / Streaming';
      backLink.textContent = 'Torna al Sito SGK';
    }
  </script>
</body>
</html>
