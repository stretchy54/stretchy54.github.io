<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Strong Roots, Good Fruit</title>

<style>

body{
font-family: Georgia, serif;
background:#f3efe8;
margin:0;
text-align:center;
color:#222;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.langbar{
margin-top:10px;
margin-bottom:20px;
font-size:20px;
}

.langbar span{
margin:0 10px;
cursor:pointer;
}

.activeLang{
border-bottom:3px solid #b59b6a;
padding-bottom:4px;
}

h1{
font-size:clamp(36px,7vw,64px);
margin:20px 0 5px 0;
line-height:1.05;
}

.subtitle{
font-style:italic;
font-size:clamp(18px,3vw,28px);
color:#666;
margin-bottom:10px;
}

.author{
font-size:24px;
margin-bottom:30px;
}

.btn{
display:block;
width:90%;
max-width:650px;
margin:14px auto;
padding:20px;
border-radius:50px;
font-size:22px;
color:white;
text-decoration:none;
}

.blue{
background:#2B5F8E;
}

.orange{
background:#D4872A;
}

.green{
background:#5A8A6A;
}

.rose{
background:#8B4A3C;
}

.lioness{
margin-top:40px;
}

.lioness img{
width:220px;
}

</style>

</head>

<body>

<div class="container">

<div class="langbar">

<span id="itBtn" onclick="setLang('it')">🇮🇹 ITALIANO</span>

<span id="enBtn" onclick="setLang('en')" class="activeLang">🇬🇧 INGLESE</span>

</div>


<h1 id="title">Strong Roots, Good Fruit</h1>

<div id="subtitle" class="subtitle">Monteleone di Puglia - A Fantasy, 2nd Edition</div>

<div class="author">Steven G Kukla</div>


<a id="downloadBtn" class="btn blue"
href="books/FINAL_ENG_MdP_1Nov2025.pdf"
onclick="return confirmDownload('Download the English PDF now?')">

⬇ Download Free Book (PDF)

</a>


<a id="websiteBtn" class="btn orange"
href="https://strongrootsgoodfruit.com">

🌐 Visit My Website

</a>


<a id="musicBtn" class="btn green"
href="music.html?lang=en">

▶ Companion Songs and Music

</a>


<a id="projectBtn" class="btn rose"
href="assets/Project.pdf"
onclick="return confirmDownload('Open the La Leonessa Project PDF?')">

⬇ About the <i>La Leonessa</i> Project

</a>


<div class="lioness">

<img src="assets/lioness.jpg">

</div>

</div>


<script>

function confirmDownload(message){

return confirm(message)

}


function setLang(lang){

if(lang==="it"){

document.getElementById("title").textContent="Radici forti, frutti buoni"

document.getElementById("subtitle").textContent="Monteleone di Puglia - Una fiaba, 2a edizione"

document.getElementById("downloadBtn").textContent="⬇ Scarica il Libro Gratuito (PDF)"

document.getElementById("downloadBtn").href="books/FINAL_ITA_MdP_1Nov2025.pdf"

document.getElementById("downloadBtn").setAttribute("onclick","return confirmDownload('Scaricare il PDF italiano adesso?')")

document.getElementById("websiteBtn").textContent="🌐 Visita il Mio Sito Web"

document.getElementById("musicBtn").textContent="▶ Canzoni e Musica"

document.getElementById("musicBtn").href="music.html?lang=it"

document.getElementById("projectBtn").innerHTML="⬇ Informazioni sul progetto <i>La Leonessa</i>"

document.getElementById("projectBtn").setAttribute("onclick","return confirmDownload('Aprire il PDF del progetto La Leonessa?')")

document.getElementById("itBtn").classList.add("activeLang")
document.getElementById("enBtn").classList.remove("activeLang")

}

else{

document.getElementById("title").textContent="Strong Roots, Good Fruit"

document.getElementById("subtitle").textContent="Monteleone di Puglia - A Fantasy, 2nd Edition"

document.getElementById("downloadBtn").textContent="⬇ Download Free Book (PDF)"

document.getElementById("downloadBtn").href="books/FINAL_ENG_MdP_1Nov2025.pdf"

document.getElementById("downloadBtn").setAttribute("onclick","return confirmDownload('Download the English PDF now?')")

document.getElementById("websiteBtn").textContent="🌐 Visit My Website"

document.getElementById("musicBtn").textContent="▶ Companion Songs and Music"

document.getElementById("musicBtn").href="music.html?lang=en"

document.getElementById("projectBtn").innerHTML="⬇ About the <i>La Leonessa</i> Project"

document.getElementById("projectBtn").setAttribute("onclick","return confirmDownload('Open the La Leonessa Project PDF?')")

document.getElementById("itBtn").classList.remove("activeLang")
document.getElementById("enBtn").classList.add("activeLang")

}

}

</script>

</body>
</html>
