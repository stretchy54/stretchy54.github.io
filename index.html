<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strong Roots, Good Fruit</title>

<style>
  body{
    margin:0;
    padding:20px;
    font-family: Georgia, "Palatino Linotype", Palatino, serif;
    background:#f3efe8;
    text-align:center;
  }
  .container{ max-width:520px; margin:auto; }

  /* Language bar */
  .langbar{ margin-bottom:18px; }
  .langbtn{
    font-size:18px;
    text-transform:uppercase;
    letter-spacing:.12em;
    margin:0 14px;
    cursor:pointer;
    background:none;
    border:none;
    padding:4px 0;
  }
  .active{ border-bottom:2px solid #7a6a3a; color:#000; }
  .inactive{ color:#888; }

  /* Typography */
  h1{ font-size:28px; margin:10px 0 6px; line-height:1.08; }
  .subtitle{ font-style:italic; color:#555; margin:0 0 10px; }
  .author{ font-size:20px; margin:0 0 18px; color:#222; }

  /* Buttons (one-line only) */
  .btn{
    display:grid;
    grid-template-columns:64px 1fr;
    align-items:center;
    text-decoration:none;
    padding:18px 20px;
    margin:14px 0;
    border-radius:14px;
    font-size:20px;
    line-height:1.2;
    box-shadow:0 10px 18px rgba(0,0,0,0.12);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .btn:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 22px rgba(0,0,0,0.18);
  }
  .primary{ background:#2f5f86; color:#fff; } /* BLUE download */
  .orange{ background:linear-gradient(135deg,#e7a338,#d98c20); color:#fff; } /* ORANGE website */

  /* Icon column: fixed box so icons align vertically across buttons */
  .icon{
    width:64px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon span{
    font-size:26px;
    line-height:1;
    /* Optical nudge applied to BOTH icons equally */
    position:relative;
    top:-1px;
  }

  /* Text column */
  .btnText{
    text-align:center;
    padding-right:12px; /* balances visual centering against icon column */
    white-space:nowrap;         /* keep single line */
    overflow:hidden;
    text-overflow:ellipsis;
  }

  /* Subtle lioness */
  .hero{ margin-top:28px; display:flex; justify-content:center; }
  .hero img{
    width:60%;
    max-width:260px;
    border-radius:14px;
    opacity:.7;
    filter:grayscale(20%);
  }

  .langblock{ display:none; }
</style>
</head>

<body>
<div class="container">

  <div class="langbar">
    <button id="btn-it" class="langbtn active" onclick="setLang('it')">🇮🇹 italiano</button>
    <button id="btn-en" class="langbtn inactive" onclick="setLang('en')">🇬🇧 inglese</button>
  </div>

  <!-- ITALIAN -->
  <div id="it" class="langblock">
    <h1>Radici forti, frutti buoni</h1>
    <div class="subtitle">Monteleone di Puglia - Una fiaba, 2a edizione</div>
    <div class="author">Steven G Kukla</div>

    <!-- DOWNLOAD (BLUE) -->
    <a class="btn primary" href="books/FINAL_ITA_MdP_1Nov2025.pdf" target="_blank" rel="noopener">
      <div class="icon"><span>⬇️</span></div>
      <div class="btnText">Scarica il Libro Gratuito (PDF)</div>
    </a>

    <!-- WEBSITE (ORANGE) -->
    <a class="btn orange" href="https://stretchy54.wixsite.com/sgk-stone-sculptures" target="_blank" rel="noopener">
      <div class="icon"><span>🌐</span></div>
      <div class="btnText">Visita il Mio Sito Web</div>
    </a>

    <div class="hero">
      <img src="assets/lioness.jpg?v=1" alt="La Leonessa">
    </div>
  </div>

  <!-- ENGLISH -->
  <div id="en" class="langblock">
    <h1>Strong Roots, Good Fruit</h1>
    <div class="subtitle">Monteleone di Puglia - A Fantasy, 2nd Edition</div>
    <div class="author">Steven G Kukla</div>

    <!-- DOWNLOAD (BLUE) -->
    <a class="btn primary" href="books/FINAL_MdP_ENG_4Nov2025.pdf" target="_blank" rel="noopener">
      <div class="icon"><span>⬇️</span></div>
      <div class="btnText">Download Free Book (PDF)</div>
    </a>

    <!-- WEBSITE (ORANGE) -->
    <a class="btn orange" href="https://stretchy54.wixsite.com/sgk-stone-sculptures" target="_blank" rel="noopener">
      <div class="icon"><span>🌐</span></div>
      <div class="btnText">Visit My Website</div>
    </a>

    <div class="hero">
      <img src="assets/lioness.jpg?v=1" alt="The Lioness Sculpture">
    </div>
  </div>

</div>

<script>
  function setLang(lang){
    document.getElementById('it').style.display = (lang === 'it') ? 'block' : 'none';
    document.getElementById('en').style.display = (lang === 'en') ? 'block' : 'none';

    document.getElementById('btn-it').className = (lang==='it') ? "langbtn active" : "langbtn inactive";
    document.getElementById('btn-en').className = (lang==='en') ? "langbtn active" : "langbtn inactive";
    document.documentElement.lang = lang;
  }

  /* Default to Italian for QR scans */
  setLang('it');
</script>
</body>
</html>
